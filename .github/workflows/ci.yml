name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Validate
        run: swift run aural-validate
      - name: Audit repository
        run: scripts/audit-open-source.sh
